<div class="lista-noticias">
  <h2 class="page-title lista-noticias__title">Noticias</h2>

  @if (noticias().length === 0) {
    <app-empty-state icon="bi-newspaper" mensaje="No hay noticias publicadas" />
  } @else {
    @for (n of noticias(); track n.id) {
      <button class="lista-noticias__noticia-btn" (click)="goToDetalle(n.id)">
        <app-card-noticia [noticia]="n" />
      </button>
    }
  }
</div>
