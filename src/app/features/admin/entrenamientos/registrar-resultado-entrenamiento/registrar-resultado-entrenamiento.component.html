<div class="registrar-e">

  <!-- Header -->
  <div class="page-header">
    <button (click)="goBack()" class="registrar-e__back-btn">
      <i class="bi bi-chevron-left"></i>
    </button>
    <h2 class="registrar-e__title">Registrar escuadra</h2>
  </div>

  @if (session().length === 0) {
    <div class="registrar-e__loading">
      <p>Cargando tiradores...</p>
    </div>
  } @else {

    <!-- Lista de tiradores tipo acordeón -->
    <div class="registrar-e__lista">
      @for (t of session(); track t.userId; let idx = $index) {
        <div class="tirador-item" [class.tirador-item--abierto]="tiradorAbierto() === idx">

          <!-- Fila resumen (siempre visible) -->
          <button type="button" class="tirador-item__fila" (click)="toggleTirador(idx)">
            <span class="tirador-item__puesto">{{ t.puesto }}</span>
            <span class="tirador-item__nombre">{{ t.nombre }}</span>
            <span class="tirador-item__contador"
              [class.tirador-item__contador--ok]="platosRotos(t) >= 20"
              [class.tirador-item__contador--mal]="platosRotos(t) < 15">
              {{ platosRotos(t) }}/25
            </span>
            <i class="bi tirador-item__chevron"
              [class.bi-chevron-down]="tiradorAbierto() !== idx"
              [class.bi-chevron-up]="tiradorAbierto() === idx">
            </i>
          </button>

          <!-- Cuadrícula de platos (expandida) -->
          @if (tiradorAbierto() === idx) {
            <div class="tirador-item__grid-wrap">
              <p class="tirador-item__fallos">{{ 25 - platosRotos(t) }} fallos</p>
              <div class="platos-grid">
                @for (i of indices; track i) {
                  <button
                    type="button"
                    (click)="togglePlato(idx, i)"
                    class="plato-btn"
                    [class.plato-btn--roto]="t.platos[i]"
                    [class.plato-btn--fallo]="!t.platos[i]"
                  >
                    @if (t.platos[i]) {
                      {{ i + 1 }}
                    } @else {
                      <i class="bi bi-x-lg"></i>
                    }
                  </button>
                }
              </div>
            </div>
          }

        </div>
      }
    </div>

    @if (error()) {
      <p class="registrar-e__error">{{ error() }}</p>
    }

    <!-- Botón guardar -->
    <button
      type="button"
      (click)="guardar()"
      [disabled]="saving()"
      class="btn-primary registrar-e__btn-guardar"
    >
      <i class="bi bi-check-lg"></i>
      {{ saving() ? 'Guardando...' : 'Guardar escuadra' }}
    </button>

  }
</div>
