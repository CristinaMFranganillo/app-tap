<div class="form-score">
  <div class="page-header">
    <button (click)="cancel()" class="form-score__back-btn">
      <i class="bi bi-chevron-left form-score__back-icon"></i>
    </button>
    <h2 class="form-score__title">Registrar Torneo</h2>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-score__form">
    <div>
      <label class="form-label">Competición</label>
      <select formControlName="competicionId" class="form-input">
        <option value="">Selecciona una competición</option>
        @for (c of competiciones(); track c.id) {
          <option [value]="c.id">{{ c.nombre }} — {{ c.modalidad }}</option>
        }
      </select>
    </div>

    <div>
      <label class="form-label">Socio</label>
      <select formControlName="userId" class="form-input">
        <option value="">Selecciona un socio</option>
        @for (s of socios(); track s.id) {
          <option [value]="s.id">{{ s.nombre }} {{ s.apellidos }} (#{{ s.numeroSocio }})</option>
        }
      </select>
    </div>

    <div>
      <label class="form-label">Platos rotos (máx. {{ maxPlatos() }})</label>
      <input
        formControlName="platosRotos"
        type="number"
        [max]="maxPlatos()"
        min="0"
        class="form-input"
      />
    </div>

    <div class="form-score__actions">
      <button type="button" (click)="cancel()" class="btn-secondary">Cancelar</button>
      <button type="submit" [disabled]="form.invalid" class="btn-primary">Registrar</button>
    </div>
  </form>
</div>
