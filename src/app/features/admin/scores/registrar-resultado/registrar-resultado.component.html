<div class="registrar-resultado">
  <h2 class="registrar-resultado__title">Registrar resultados</h2>

  <label class="form-label">Competición</label>
  <select
    [value]="competicionId()"
    (change)="competicionId.set($any($event.target).value)"
    class="form-input registrar-resultado__selects"
  >
    <option value="">Selecciona</option>
    @for (c of competiciones(); track c.id) {
      <option [value]="c.id">{{ c.nombre }}</option>
    }
  </select>

  @if (competicionId()) {
    <label class="form-label">Escuadra</label>
    <select
      [value]="escuadraId()"
      (change)="escuadraId.set($any($event.target).value)"
      class="form-input registrar-resultado__selects"
    >
      <option value="">Selecciona escuadra</option>
      @for (e of escuadras(); track e.id) {
        <option [value]="e.id">Escuadra {{ e.numero }}</option>
      }
    </select>
  }

  @if (escuadraId()) {
    <div class="registrar-resultado__counters">
      <div class="counter-card">
        <p class="counter-card__label">Serie</p>
        <div class="counter-card__controls">
          <button (click)="decrementSerie()" class="counter-card__btn">−</button>
          <span class="counter-card__value">{{ serieActual() }}</span>
          <button (click)="incrementSerie()" class="counter-card__btn">+</button>
        </div>
      </div>
      <div class="counter-card">
        <p class="counter-card__label">Plato</p>
        <div class="counter-card__controls">
          <button (click)="decrementPlato()" class="counter-card__btn">−</button>
          <span class="counter-card__value">{{ platoActual() }}</span>
          <button (click)="incrementPlato()" class="counter-card__btn">+</button>
        </div>
      </div>
    </div>

    @for (t of tiradores(); track t.id) {
      <div class="card tirador-item">
        <div>
          <p class="tirador-item__nombre">{{ getUserNombre(t.userId) }}</p>
          <p class="tirador-item__puesto">Puesto {{ t.puesto }}</p>
        </div>
        <div class="tirador-item__actions">
          <button (click)="registrar(t.userId, 1)" [disabled]="saving()" class="btn-roto">ROTO</button>
          <button (click)="registrar(t.userId, 0)" [disabled]="saving()" class="btn-fallo">FALLO</button>
        </div>
      </div>
    }
  }
</div>
