<div class="form-escuadra">
  <div class="page-header">
    <button (click)="cancel()" class="form-escuadra__back-btn">
      <i class="bi bi-chevron-left form-escuadra__back-icon"></i>
    </button>
    <h2 class="form-escuadra__title">Nueva Escuadra</h2>
  </div>

  <p class="form-escuadra__section-label">Tiradores por puesto</p>

  @for (p of puestos(); track $index) {
    <div class="form-escuadra__puesto">
      <label class="form-escuadra__puesto-label">Puesto {{ $index + 1 }}</label>

      <div class="tirador-search">
        <div class="tirador-search__input-wrap">
          <i class="bi bi-search tirador-search__icon"></i>
          <input
            type="text"
            [ngModel]="p.query"
            (ngModelChange)="onQuery($index, $event)"
            (focus)="abrirDropdown($index)"
            (blur)="cerrarDropdown($index)"
            placeholder="Buscar tirador..."
            class="tirador-search__input"
            autocomplete="off"
          />
          @if (p.userId) {
            <button type="button" (click)="limpiar($index)" class="tirador-search__clear">
              <i class="bi bi-x"></i>
            </button>
          }
        </div>

        @if (p.open && filtrados($index).length > 0) {
          <ul class="tirador-search__dropdown">
            @for (s of filtrados($index); track s.id) {
              <li
                (pointerdown)="seleccionar($index, s)"
                class="tirador-search__option"
                [class.tirador-search__option--selected]="p.userId === s.id"
              >
                <span class="tirador-search__option-name">{{ s.nombre }} {{ s.apellidos }}</span>
                <span class="tirador-search__option-num">#{{ s.numeroSocio }}</span>
              </li>
            }
          </ul>
        }
      </div>
    </div>
  }

  @if (error) {
    <p class="form-escuadra__error">{{ error }}</p>
  }

  <div class="form-escuadra__actions">
    <button (click)="cancel()" class="btn-secondary">Cancelar</button>
    <button (click)="onSubmit()" [disabled]="loading" class="btn-primary">
      {{ loading ? 'Guardando...' : 'Crear escuadra' }}
    </button>
  </div>
</div>
