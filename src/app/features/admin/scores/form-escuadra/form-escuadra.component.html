<div class="form-escuadra">
  <div class="page-header">
    <button (click)="cancel()" class="form-escuadra__back-btn">
      <i class="bi bi-chevron-left form-escuadra__back-icon"></i>
    </button>
    <h2 class="form-escuadra__title">Nueva Escuadra</h2>
  </div>

  <p class="form-escuadra__section-label">Tiradores por puesto</p>

  @for (puesto of puestos; track $index) {
    <div class="form-escuadra__puesto">
      <label class="form-escuadra__puesto-label">Puesto {{ $index + 1 }}</label>
      <select [(ngModel)]="puestos[$index]" class="form-input-surface">
        <option value="">— Sin asignar —</option>
        @for (s of socios(); track s.id) {
          <option [value]="s.id">{{ s.apellidos }}, {{ s.nombre }} (#{{ s.numeroSocio }})</option>
        }
      </select>
    </div>
  }

  @if (error) {
    <p class="form-escuadra__error">{{ error }}</p>
  }

  <div class="form-escuadra__actions">
    <button (click)="cancel()" class="btn-secondary">Cancelar</button>
    <button (click)="onSubmit()" [disabled]="loading" class="btn-primary">
      {{ loading ? 'Guardando...' : 'Crear escuadra' }}
    </button>
  </div>
</div>
