<div class="form-escuadra-e">
  <div class="page-header">
    <button (click)="cancel()" class="form-escuadra-e__back-btn">
      <i class="bi bi-chevron-left form-escuadra-e__back-icon"></i>
    </button>
    <h2 class="form-escuadra-e__title">Nueva escuadra</h2>
  </div>

  @if (inscritosLibres().length === 0) {
    <p class="form-escuadra-e__section-label">
      No hay inscritos disponibles. Inscribe participantes desde la pantalla del torneo.
    </p>
  } @else {
    <p class="form-escuadra-e__section-label">Tiradores por puesto</p>

    @for (slot of [0,1,2,3,4,5]; track slot) {
      <div class="form-escuadra-e__puesto">
        <div class="form-escuadra-e__puesto-header">
          <label class="form-label">Puesto {{ slot + 1 }}</label>
        </div>
        <div class="form-escuadra-e__input-row">
          <select
            class="form-input-surface"
            [value]="inscripcionIds[slot]"
            (change)="onSelectInscrito(slot, $event)">
            <option value="">— Sin asignar —</option>
            @for (ins of opcionesPara(slot); track ins.id) {
              <option [value]="ins.id">
                {{ ins.apellidos }}, {{ ins.nombre }} ({{ ins.esNoSocio ? 'Invitado' : 'Socio' }})
              </option>
            }
          </select>
        </div>
      </div>
    }
  }

  @if (error) {
    <p class="form-escuadra-e__error">{{ error }}</p>
  }

  <div class="form-escuadra-e__actions">
    <button (click)="cancel()" class="btn-secondary">Cancelar</button>
    <button (click)="onSubmit()" [disabled]="loading || asignadosCount === 0" class="btn-primary">
      {{ loading ? 'Guardando...' : 'Crear escuadra' }}
    </button>
  </div>
</div>
