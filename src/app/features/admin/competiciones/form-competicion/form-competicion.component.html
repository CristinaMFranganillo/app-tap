<div class="form-competicion">
  <div class="page-header">
    <button (click)="cancel()" class="form-competicion__back-btn">
      <i class="bi bi-chevron-left form-competicion__back-icon"></i>
    </button>
    <h2 class="form-competicion__title">Nueva Competición</h2>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-competicion__form">
    <div>
      <label class="form-label">Nombre</label>
      <input
        formControlName="nombre"
        type="text"
        placeholder="Campeonato Provincial 2026"
        class="form-input form-competicion__input"
      />
    </div>

    <div>
      <label class="form-label">Modalidad</label>
      <input
        formControlName="modalidad"
        type="text"
        placeholder="Foso Olímpico, Skeet, Foso Universal..."
        class="form-input form-competicion__input"
      />
    </div>

    <div class="form-competicion__row">
      <div class="form-competicion__col">
        <label class="form-label">Platos por serie</label>
        <input
          formControlName="platosPorSerie"
          type="number"
          min="1"
          class="form-input"
        />
      </div>
      <div class="form-competicion__col">
        <label class="form-label">Nº de series</label>
        <input
          formControlName="numSeries"
          type="number"
          min="1"
          class="form-input"
        />
      </div>
    </div>

    <div>
      <label class="form-label">Lugar (opcional)</label>
      <input
        formControlName="lugar"
        type="text"
        placeholder="Campo de tiro..."
        class="form-input form-competicion__input"
      />
    </div>

    <div>
      <label class="form-label">Fecha</label>
      <input
        formControlName="fecha"
        type="date"
        class="form-input"
      />
    </div>

    <label class="form-competicion__checkbox-label">
      <input type="checkbox" formControlName="activa" class="form-competicion__checkbox" />
      <span class="form-competicion__checkbox-text">Marcar como competición activa</span>
    </label>

    <div class="form-competicion__actions">
      <button type="button" (click)="cancel()" class="btn-secondary">Cancelar</button>
      <button type="submit" [disabled]="form.invalid" class="btn-primary">Crear competición</button>
    </div>
  </form>
</div>
