<div class="form-noticia">
  <div class="page-header">
    <button (click)="cancel()" class="form-noticia__back-btn">
      <i class="bi bi-chevron-left form-noticia__back-icon"></i>
    </button>
    <h2 class="form-noticia__title">
      {{ isEdit ? 'Editar noticia' : 'Nueva noticia' }}
    </h2>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-noticia__form">
    <div>
      <label class="form-label">Título</label>
      <input
        formControlName="titulo"
        type="text"
        placeholder="Título de la noticia"
        class="form-input form-noticia__input"
      />
    </div>

    <div>
      <label class="form-label">Contenido</label>
      <textarea
        formControlName="contenido"
        rows="6"
        placeholder="Escribe el contenido de la noticia..."
        class="form-input form-noticia__input form-noticia__textarea"
      ></textarea>
    </div>

    <label class="form-noticia__checkbox-label">
      <input type="checkbox" formControlName="publicada" class="form-noticia__checkbox" />
      <span class="form-noticia__checkbox-text">Publicar inmediatamente</span>
    </label>

    <div class="form-noticia__actions">
      <button type="button" (click)="cancel()" class="btn-secondary">Cancelar</button>
      <button type="submit" [disabled]="form.invalid" class="btn-primary">
        {{ isEdit ? 'Guardar cambios' : 'Crear noticia' }}
      </button>
    </div>
  </form>
</div>
