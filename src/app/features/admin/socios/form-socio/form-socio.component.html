<div class="form-socio">
  <div class="page-header">
    <button (click)="cancel()" class="form-socio__back-btn">
      <i class="bi bi-chevron-left form-socio__back-icon"></i>
    </button>
    <h3 class="form-socio__title">{{ isEdit ? 'Editar Socio' : 'Nuevo Socio' }}</h3>
  </div>

  @if (error()) {
    <p class="form-socio__error">{{ error() }}</p>
  }

  <div class="form-socio__card">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-socio__form">
      <div>
        <label class="form-label">Nombre</label>
        <input formControlName="nombre" placeholder="Nombre" class="form-input-surface" />
      </div>

      <div>
        <label class="form-label">Apellidos</label>
        <input formControlName="apellidos" placeholder="Apellidos" class="form-input-surface" />
      </div>

      @if (!isEdit) {
        <div>
          <label class="form-label">Email</label>
          <input formControlName="email" type="email" placeholder="email@ejemplo.es" class="form-input-surface" />
        </div>
      }

      <div>
        <label class="form-label">Rol</label>
        <select formControlName="rol" class="form-input-surface">
          <option value="socio">Socio</option>
          <option value="moderador">Moderador</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <div class="form-socio__actions">
        <button type="button" (click)="cancel()" class="btn-secondary">Cancelar</button>
        <button type="submit" [disabled]="form.invalid || saving()" class="btn-primary">
          {{ saving() ? 'Guardando...' : (isEdit ? 'Guardar cambios' : 'Crear socio') }}
        </button>
      </div>
    </form>
  </div>
</div>
