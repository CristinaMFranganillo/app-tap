<div class="login-page">
  <!-- Hero -->
  <div class="login-hero">
    <div class="login-logo">
      <img src="logo.png" alt="Logo" />
    </div>
  </div>

  <!-- Card form -->
  <div class="login-body">
    <h2 class="login-heading">Acceder</h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <label class="form-label">Email</label>
      <div class="login-field login-field--mb">
        <i class="bi bi-envelope-fill"></i>
        <input
          formControlName="email"
          type="email"
          autocomplete="email"
          placeholder="socio@sanisidro.es"
        />
      </div>

      <label class="form-label">Contraseña</label>
      <div class="login-field login-field--mb-lg">
        <i class="bi bi-lock-fill"></i>
        <input
          formControlName="password"
          type="password"
          autocomplete="current-password"
          placeholder="••••••••"
        />
      </div>

      @if (error) {
        <p class="login-error">{{ error }}</p>
      }

      <button type="submit" [disabled]="form.invalid || loading" class="btn-login">
        <i class="bi bi-box-arrow-in-right"></i>
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <button type="button" class="login-forgot" (click)="abrirRecuperar()">¿Olvidaste tu contraseña?</button>
  </div>
</div>

@if (mostrarRecuperar()) {
  <div class="recuperar-overlay" (click)="cerrarRecuperar()"></div>
  <div class="recuperar-modal">
    <h3 class="recuperar-title">Recuperar contraseña</h3>

    @if (recuperarMsg()) {
      <p class="recuperar-ok">{{ recuperarMsg() }}</p>
      <button type="button" class="btn-login" (click)="cerrarRecuperar()">Cerrar</button>
    } @else {
      <p class="recuperar-desc">Introduce tu email y te enviaremos un enlace para restablecer tu contraseña.</p>
      <div class="login-field login-field--mb">
        <i class="bi bi-envelope-fill"></i>
        <input
          type="email"
          [(ngModel)]="recuperarEmail"
          placeholder="socio@sanisidro.es"
          autocomplete="email"
        />
      </div>

      @if (recuperarError()) {
        <p class="login-error">{{ recuperarError() }}</p>
      }

      <button
        type="button"
        class="btn-login"
        [disabled]="recuperarLoading()"
        (click)="enviarRecuperar()"
      >
        {{ recuperarLoading() ? 'Enviando...' : 'Enviar enlace' }}
      </button>

      <button type="button" class="recuperar-cancel" (click)="cerrarRecuperar()">Cancelar</button>
    }
  </div>
}
