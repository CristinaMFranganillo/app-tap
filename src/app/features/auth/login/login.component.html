<div class="login-page">
  <!-- Hero -->
  <div class="login-hero">
    <div class="login-logo">
      <img src="logo.png" alt="Logo" />
    </div>
  </div>

  <!-- Card form -->
  <div class="login-body">
    <h2 class="login-heading">Acceder</h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <label class="form-label">Email</label>
      <div class="login-field login-field--mb">
        <i class="bi bi-envelope-fill"></i>
        <input
          formControlName="email"
          type="email"
          autocomplete="email"
          placeholder="socio@sanisidro.es"
        />
      </div>

      <label class="form-label">Contraseña</label>
      <div class="login-field login-field--mb-lg">
        <i class="bi bi-lock-fill"></i>
        <input
          formControlName="password"
          type="password"
          autocomplete="current-password"
          placeholder="••••••••"
        />
      </div>

      @if (error) {
        <p class="login-error">{{ error }}</p>
      }

      <button type="submit" [disabled]="form.invalid || loading" class="btn-login">
        <i class="bi bi-box-arrow-in-right"></i>
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <p class="login-forgot">¿Olvidaste tu contraseña?</p>
  </div>
</div>
