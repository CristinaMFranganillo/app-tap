<header class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-4 bg-white border-b border-gray-100"
        style="height:54px">
  <div class="flex items-center gap-2">
    <img
      src="logo.png"
      alt="Logo Campo de Tiro San Isidro"
      class="w-9 h-9 object-contain"
    />
    <div class="leading-tight">
      <p class="text-brand-dark font-semibold text-[14px] tracking-tight">Campo de Tiro</p>
      <p class="text-gray-400 font-medium text-[11px] uppercase tracking-widest">San Isidro</p>
    </div>
  </div>
  <app-avatar
    [nombre]="(currentUser$ | async)?.nombre ?? ''"
    [apellidos]="(currentUser$ | async)?.apellidos ?? ''"
    [avatarUrl]="(currentUser$ | async)?.avatarUrl"
    [size]="30"
  />
</header>
