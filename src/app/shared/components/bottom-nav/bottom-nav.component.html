<nav class="app-bottom-nav fixed bottom-0 left-0 right-0 z-50 flex justify-around bg-white border-t border-gray-200">
  @for (item of navItems; track item.route) {
    <a
      [routerLink]="item.route"
      routerLinkActive="active-nav"
      [routerLinkActiveOptions]="{exact: item.route === '/'}"
      class="flex flex-col items-center gap-0.5 text-[11px] font-bold uppercase tracking-wide text-gray-300 no-underline"
    >
      <i class="bi text-[22px]" [class]="item.icon"></i>
      {{ item.label }}
    </a>
  }
</nav>
