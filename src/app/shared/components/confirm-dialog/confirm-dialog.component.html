<!-- Backdrop -->
<div class="cd-backdrop" (click)="cancelado.emit()"></div>

<!-- Sheet -->
<div class="cd-sheet" role="alertdialog" aria-modal="true" [attr.aria-label]="titulo()">

  <!-- Icono -->
  <div class="cd-icon-wrap">
    <i class="bi bi-trash3-fill cd-icon"></i>
  </div>

  <!-- Texto -->
  <h3 class="cd-titulo">{{ titulo() }}</h3>
  <p class="cd-mensaje">{{ mensaje() }}</p>

  <!-- Acciones -->
  <div class="cd-actions">
    <button class="cd-btn cd-btn--cancel" (click)="cancelado.emit()">Cancelar</button>
    <button class="cd-btn cd-btn--confirm" (click)="confirmado.emit()">{{ labelConfirmar() }}</button>
  </div>

</div>
