<div [style.width.px]="size" [style.height.px]="size">
  @if (avatarUrl) {
    <img
      [src]="avatarUrl"
      [alt]="nombre + ' ' + apellidos"
      class="w-full h-full object-cover rounded-full"
    />
  } @else {
    <div
      class="w-full h-full rounded-full bg-brand-yellow flex items-center justify-center"
      [style.fontSize.px]="size * 0.55"
    >
      <i class="bi bi-person-fill text-brand-dark leading-none"></i>
    </div>
  }
</div>
